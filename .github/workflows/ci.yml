name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo check
        run: make check

      - name: Run tests
        run: make test

  release-and-docs:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Typst
        run: |
          cargo install --locked typst-cli

      - name: Build release
        run: make release

      - name: Strip binary
        run: make strip

      - name: Build manual
        run: make manual