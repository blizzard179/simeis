name: Quality CI

on:
  push:
    branches:
      - main
      - feature/**
      - bug/**
      - release/**
  pull_request:
    branches:
      - main
      - feature/**
      - bug/**
      - release/**

jobs:
  quality:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Vérification compilation
        run: cargo check

      - name: Vérification formatage
        run: cargo fmt --all --check

      - name: Vérification Clippy
        run: cargo clippy --all-targets --features compio -- -D warnings

       # Python
      - name: Installation Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer Black
        run: pip install black

      - name: Vérifier le formatage Python
        run: black --check tests/